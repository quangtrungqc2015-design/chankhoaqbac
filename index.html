<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Điều Khiển Cấu Hình</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 1px solid #334155;
            box-sizing: border-box;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #38bdf8;
        }
        p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .btn {
            display: block;
            background: #0284c7;
            color: white;
            padding: 14px;
            margin: 12px 0;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            width: 100%;
            font-size: 16px;
            box-sizing: border-box;
        }
        .btn:hover {
            background: #0369a1;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #334155;
            color: #cbd5e1;
        }
        .btn-secondary:hover {
            background: #475569;
        }
        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>QUANG BẮC PRO 2</h1>
    <p>Hệ thống cung cấp file cấu hình chất lượng cao và cập nhật liên tục.</p>
    
    <a href="SANG2027.mobileconfig" download class="btn">TẢI FILE CONFIG</a>

    <button class="btn btn-secondary" onclick="copyLink()">SAO CHÉP LINK CONFIG</button>

    <div class="footer">© 2026 Quang Bắc Pro. All rights reserved.</div>
</div>

<script>
    function copyLink() {
        const linkConfig = window.location.href + "SANG2027.mobileconfig"; 
        navigator.clipboard.writeText(linkConfig).then(() => {
            alert("Đã sao chép đường dẫn file config vào bộ nhớ tạm!");
        }).catch(err => {
            alert("Lỗi khi sao chép: " + err);
        });
    }
</script>

</body>
</html>
